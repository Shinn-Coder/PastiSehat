services:
  # ─── PostgreSQL Database ───────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: pastisehat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pastisehat
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d pastisehat" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ─── Backend Express + Prisma ──────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: pastisehat-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/pastisehat?schema=public
      PORT: 8000
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma

  # ─── Frontend React + Vite ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pastisehat-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
